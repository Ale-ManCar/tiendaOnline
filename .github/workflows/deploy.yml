name: Deploy Nova Store to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@example.invalid:5432/nova_store?schema=public
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm version
        run: npm install --global npm@10.9.2

      - name: Install dependencies
        run: npm ci

      - name: Report frontend API mode
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "VITE_API_URL is not set. The storefront will use browser-only demo fallback when the API is unavailable."
          else
            echo "VITE_API_URL is configured."
          fi

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate

      - name: Validate database schema
        working-directory: server
        run: npx prisma validate

      - name: Test backend
        working-directory: server
        run: npm test -- --runInBand

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload compiled application
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
