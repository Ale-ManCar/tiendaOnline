services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nova_store
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova_dev_password
    ports:
      - "5432:5432"
    volumes:
      - nova_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova_store"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nova_postgres_data:
