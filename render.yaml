services:
  - type: web
    name: nova-store-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run deploy:build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/ready
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:5173,https://ale-mancar.github.io
