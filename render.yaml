services:
  - type: web
    runtime: node
    name: nova-store-api
    region: oregon
    plan: free
    branch: main
    buildCommand: cd server && npm ci --include=dev && npm run deploy:build
    initialDeployHook: cd server && npm run seed:prod
    startCommand: cd server && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://ale-mancar.github.io
      - key: SESSION_SECRET
        generateValue: true
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SHIPPING_FLAT_RATE
        value: 5
      - key: FREE_SHIPPING_THRESHOLD
        value: 100
