services:
  - type: web
    runtime: node
    name: nova-store-api
    region: oregon
    plan: free
    branch: main
    buildCommand: cd server && npm ci --include=dev && npm run deploy:build
    initialDeployHook: cd server && npm run seed:prod
    startCommand: cd server && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://ale-mancar.github.io
      - key: SESSION_SECRET
        generateValue: true
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: APP_PUBLIC_URL
        value: https://ale-mancar.github.io/tiendaOnline
      - key: AUTH_REQUIRE_EMAIL_VERIFICATION
        value: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ORDER_NOTIFICATION_EMAIL
        value: alemancar0511@gmail.com
      - key: STORE_NAME
        value: Nova Store
      - key: STORE_SUPPORT_PHONE
        value: 0968822603
      - key: SHIPPING_FLAT_RATE
        value: 5
      - key: FREE_SHIPPING_THRESHOLD
        value: 100
